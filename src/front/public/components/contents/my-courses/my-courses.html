<section class="min-h-full bg-neutral-100 px-4 py-6 text-neutral-950 sm:px-8">
  <div class="mx-auto w-full max-w-6xl">
    <div class="flex flex-col gap-4 xl:flex-row xl:items-end xl:justify-between">
      <div>
        <h2 class="text-2xl font-semibold">Mes cours</h2>
        <p id="my-courses-date" class="text-sm text-neutral-500">Aujourd'hui</p>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <div class="inline-flex border border-neutral-300 bg-white text-sm font-medium text-neutral-800">
          <button id="my-courses-view-day" type="button" data-period-view="day" class="border-r border-neutral-300 px-3 py-2 transition hover:bg-neutral-50">Jour</button>
          <button id="my-courses-view-week" type="button" data-period-view="week" class="border-r border-neutral-300 px-3 py-2 transition hover:bg-neutral-50">Semaine</button>
          <button id="my-courses-view-month" type="button" data-period-view="month" class="px-3 py-2 transition hover:bg-neutral-50">Mois</button>
        </div>
        <button id="my-courses-prev" type="button" class="inline-flex items-center gap-2 border border-neutral-300 bg-white px-3 py-2 text-sm font-medium text-neutral-800 transition hover:bg-neutral-50">
          <i class="fa-solid fa-chevron-left shrink-0" aria-hidden="true"></i>
          <span id="my-courses-prev-label">Veille</span>
        </button>
        <button id="my-courses-today" type="button" class="inline-flex items-center gap-2 border border-[#624292] bg-[#624292] px-3 py-2 text-sm font-medium text-white transition hover:bg-[#52357f]">
          <i class="fa-regular fa-clock shrink-0" aria-hidden="true"></i>
          <span id="my-courses-current-label">Aujourd'hui</span>
        </button>
        <button id="my-courses-next" type="button" class="inline-flex items-center gap-2 border border-neutral-300 bg-white px-3 py-2 text-sm font-medium text-neutral-800 transition hover:bg-neutral-50">
          <span id="my-courses-next-label">Lendemain</span>
          <i class="fa-solid fa-chevron-right shrink-0" aria-hidden="true"></i>
        </button>
        <input id="my-courses-calendar" type="date" class="border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-800" />
        <button id="my-courses-refresh" type="button" class="inline-flex items-center gap-2 border border-neutral-300 bg-white px-3 py-2 text-sm font-medium text-neutral-800 transition hover:bg-neutral-50">
          <i class="fa-solid fa-rotate-right shrink-0" aria-hidden="true"></i>
          <span>Actualiser</span>
        </button>
        <a id="my-courses-day-pdf" href="#" target="_blank" rel="noopener" class="hidden items-center gap-2 border border-[#624292] bg-white px-3 py-2 text-sm font-medium text-[#624292] transition hover:bg-[#f4eefc]">
          <i class="fa-solid fa-file-pdf shrink-0" aria-hidden="true"></i>
          <span>PDF journée</span>
        </a>
      </div>
    </div>

    <div id="my-courses-content" class="mt-5 space-y-3">
      <div class="border border-neutral-200 bg-white p-5 shadow-sm">
        <p class="text-sm text-neutral-600">Chargement des cours...</p>
      </div>
    </div>
  </div>
</section>
