<section class="hero-bg relative flex min-h-full flex-1 items-center justify-center px-4 py-12 sm:px-8 sm:py-14">
  <div class="relative z-10 flex w-full max-w-[830px] flex-col items-center border-4 border-white/90 bg-black/5 px-4 py-16 text-center shadow-2xl sm:px-10">
    <h2 id="auth-card-title" class="max-w-full text-2xl font-light leading-tight tracking-normal text-white sm:text-4xl md:text-[40px]">
      Bienvenue sur Saintonge Access Control
    </h2>
    <p id="auth-card-subtitle" class="mt-4 max-w-full text-lg font-light leading-snug text-white sm:text-3xl">
      Votre nouvel outil de gestion d'appel automatisé
    </p>

    <div class="mt-8 flex w-full flex-col items-center gap-3 sm:mt-9 sm:w-auto sm:flex-row">
      <button
        onclick="location.href='/api/o365/login'"
        id="login-btn"
        class="hidden min-h-14 w-full max-w-sm items-center justify-center gap-6 border-4 border-black bg-neutral-200 px-4 py-2 text-xl text-neutral-950 transition hover:bg-white focus:outline-none focus:ring-4 focus:ring-white/50 sm:w-auto sm:max-w-none sm:text-2xl"
      >
        <span class="grid h-8 w-8 shrink-0 grid-cols-2 grid-rows-2 gap-0.5 sm:h-9 sm:w-9">
          <span class="bg-[#f25022]"></span>
          <span class="bg-[#7fba00]"></span>
          <span class="bg-[#00a4ef]"></span>
          <span class="bg-[#ffb900]"></span>
        </span>
        <span class="min-w-0 text-center leading-tight">Connecter avec Office 365</span>
      </button>
    </div>

    <div id="nfc-result" class="mt-6 min-h-6 max-w-2xl text-base font-medium leading-snug text-white"></div>
    <pre id="info" class="sr-only">Not loaded</pre>
  </div>
</section>
