<!-- ./front/public/index.page.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#624292" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SAC" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SAC - Saintonge Access Control</title>
  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    .hero-bg {
      background-image:
        linear-gradient(rgba(20, 18, 28, 0.28), rgba(20, 18, 28, 0.28)),
        url("/ressources/fond_page_login.png");
      background-size: cover;
      background-position: center;
    }

    .hero-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(3px);
    }

    #signature-modal.open { display: flex; }

    #signature-canvas {
      width: 100%;
      height: 220px;
      background: #fff;
      touch-action: none;
    }

    @media (max-height: 680px) {
      #signature-canvas {
        height: 160px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@5.1.2/dist/signature_pad.umd.min.js"></script>
  <link rel="manifest" href="/manifest.webmanifest.json" />
  <link rel="apple-touch-icon" href="/ressources/ensemble_scolaire_lyce_sainte_famille_saintonge_formation_logo_512x512.png" />
</head>

<body class="min-h-dvh w-full bg-neutral-950 text-white antialiased">
  <div id="app-shell" class="flex h-dvh w-full flex-col overflow-hidden bg-neutral-950">
    <div id="header-slot"></div>

    <div class="flex min-h-0 flex-1 flex-col lg:flex-row">
      <div id="sidebar-slot"></div>
      <main id="content-slot" class="min-h-0 min-w-0 flex-1 overflow-y-auto overscroll-contain"></main>
    </div>

    <div id="footer-slot" class="shrink-0"></div>
  </div>

  <script src="/js/component_loader.loader.js"></script>
  <script src="/script.app.js"></script>
</body>
</html>
