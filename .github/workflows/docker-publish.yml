name: Build, Scan and Deploy Docker image

on:
  workflow_run:
    workflows:
      - Quality and Security
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-main-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image: ghcr.io/${{ github.repository }}/server-app:${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server-app:latest
            ghcr.io/${{ github.repository }}/server-app:${{ github.event.workflow_run.head_sha }}

  image-security:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Trivy image scan summary
        id: trivy_image_summary
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: table
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy image SARIF
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: sarif
          output: trivy-image-results.sarif
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: ${{ always() && hashFiles('trivy-image-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif

      - name: Fail on Trivy image findings
        if: ${{ steps.trivy_image_summary.outcome == 'failure' }}
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - image-security

    if: ${{ needs.build.result == 'success' && needs.image-security.result == 'success' }}

    steps:
      - name: Call Portainer Webhook
        run: curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}