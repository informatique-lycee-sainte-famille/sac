name: Build and Deploy Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # =========================
  # BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ghcr.io/${{ github.repository }}/server-app:latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/server-app:latest

  # =========================
  # DEPLOY JOB
  # =========================
  deploy:
    runs-on: ubuntu-latest

    # 🔥 KEY PART
    needs: build

    # ✅ Only run if build succeeded AND it's not a PR
    if: ${{ needs.build.result == 'success' && github.event_name == 'push' }}

    steps:
      - name: Call Portainer Webhook
        run: curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}