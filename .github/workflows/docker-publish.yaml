name: Build and Deploy Docker image

on:
  workflow_run:
    workflows:
      - Quality and Security
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-main-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  # =========================
  # BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image: ghcr.io/${{ github.repository }}/server-app:latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server-app:latest
            ghcr.io/${{ github.repository }}/server-app:${{ github.event.workflow_run.head_sha }}

  # =========================
  # DEPLOY JOB
  # =========================
  deploy:
    runs-on: ubuntu-latest

    # 🔥 KEY PART
    needs: build

    if: ${{ needs.build.result == 'success' }}

    steps:
      - name: Call Portainer Webhook
        run: curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}
